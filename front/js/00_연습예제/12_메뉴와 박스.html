<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Document</title>
	<style>
		*{ padding: 0; margin: 0; color: black;}
		a{ text-decoration: none;}
		ul{ list-style: none;}
		.list-menu{
			display: flex;
		}
		.item-menu{
			width: 100%; border: 3px solid black;
			line-height: 50px; text-align: center;
				display: none;
		
		}
		.item-menu + .item-menu{
			margin-left: -3px;
		}
		.link-menu{
			display: block;
		}

		.item-menu.active{
			background-color: aliceblue;
		}
		.box{
			border: 3px solid black; height: 300px;
		}
		.container{
			margin-top: 20px;
		}
		.box.active{
			display: block;
		}
	</style>
</head>
<body>
	<nav>
		<ul class="list-menu">
			<li class="item-menu">
				<a href="#" class="link-menu">메뉴1</a>
			</li>
			<li class="item-menu">
				<a href="#" class="link-menu">메뉴2</a>
			</li>
			<li class="item-menu">
				<a href="#" class="link-menu">메뉴3</a>
			</li>
		</ul>
	</nav>
	<div class="container">
		<div class="box">1</div>
		<div class="box">2</div>
		<div class="box">3</div>
	</div>
	<script>
		/*
		메뉴를 클릭하면 클릭한 메뉴에 배경색이 노란색이 되도록 작성 
		*/

	// 배경을 빨강으로 바꾸는 작업
		// 클래스가 item-menu 요소들을 선택
		const itemMenus = document.querySelectorAll(".item-menu");

		//선택된 요소들을 forEach를 이용하여 클릭 이벤트를 등록
		itemMenus.forEach(function(메뉴){
			메뉴.addEventListener('click', function(){
			
			// 클래스가 active인 요소를 선택
			const active = document.querySelector('.item-menu.active');
			
			// 선택한 요소의 active 클래스를 제거
			if(active){
				active.classList.remove('active');
			}
			// 선택한 메뉴에 active 클래스를 추가)
			메뉴.classList.add('active');

			//이전에 선택한 박스 제거
			const activeBox = document.querySelector('.box.active');
			if(activeBox){
				activeBox.classList.remove('active')
			}

			//현재 선택한 메뉴에 맞는 박스 추가
			//1. 선택한 메뉴가 원하는 박스 선택자 가져오기

			const target = 메뉴.dataset.target;
			//선택자에 맞는 박스 선택
			const 박스 = document.querySelector(target);
			// 박스에 active 클래스 추가
			박스.classList.add('active');
			})

		})


	

		
	</script>
</body>
</html>
