<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Document</title>
</head>
<body>
	
	<script>
		/*
		prompt를 이용하여 두 정수를 입력받아 두 정수의 합을 
		alert으로 출력하는 코드를 작성
		-prompt를 이용하여 입력을 받으면 값에 상관없이 타입이 문자열이다.
		- 문자열 + 문자열 => 두 문자열을 이어붙임
		*/

		let number = prompt("숫자", '')
		let number2 = prompt("숫자2", '')
		let result= parseInt(number) +parseInt(number2);
		alert(`${number} + ${number2} = ${result}`);
		

		// alert{ Number + }
		
	</script>
</body>
</html>
