<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>입출력 예제</title>
</head>
<body>
	
	<script>
		/* prompt로 이름을 입력받아 
		document.write로 브라우저 화면에 이름을 출력하는 코드를 작성*/

		let name = prompt("당신의 이름은?", '')
		document.write(name)

		// console.log(1, '안녕', 1.23)
		// let name = "홍길동" ;
		alert(name + "님 환영합니다.");

		document.write('홍길동')
	</script>
</body>
</html>
