<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>조건문</title>
</head>
<body>
	<script>
		/*
		- 상황에 따라 결과가 달라질 때 사용
		- 예시 : 음료수 자판기
			-> 누른 메뉴에 따라 나오는 음료가 달라짐
		- 말로 표현했을 때 ~이면 ~해라라고 표현되면 조건문 사용
		- 성적이 90이상이고 100점이하이면 학점은 A로 출력해라
		-	면허증을 가져왔거나 민증을 가져왔거나 여권을 가져왔으면 토익을 응시해도 좋다	

		if문
		- 모든 조건문은 if문으로 표현 가능하다
		- 문법
	if(조건식){
		실행문;
	}
	- 문법 설명
		- 조건식 : 결과가 참 또는 거짓이 되는 식
		- 하지만 js에서는 결과가 꼭 true/false가 아녀도 동작 함
	- 문법 적용
		- A이면 B해라 => 조건식 사용 가능
		if(A){
			B;
		}
		- 성적을 조건문에 적용
		if(성적이 90점 이상이고 100점이하){
			학점을 A로 출력해라;
		}
		- 토익을 조건문에 적용
		if(면허증이 있거나 민증이 있거나 여권이 있다){
			토익을 응시해라;
			}
		*/
		let 면허증 = true, 민증 = false, 여권 = true;
		if(면허증 || 민증 || 여권){
			document.write('토익 응시 가능<br>');
		}
		//면허증이 없고 민증도 없고 여권도 없으면 토익 응시 불가능
		if(!면허증 && !민증 && !여권)
			document.write('토익 응시 불가능<br>');

		//면허증 if문을 참고하며 성적을 if문으로 구현하세요
		let score = 95;
		//성적 90보다 크다 || 성적이 90과같다 =>

		if( score >= 90 && score <= 100 ){
			document.write(score + '학점 A<br>');
		}

		/*
		if else문
		- A이면 B해라 아니면 C해라
		- 모 아니면 도일때 사용
		- 신분증이 있으면 토익 응시가 가능하고 아니면 토익 응시가 불가능
		- if문 2개 쓸걸 하나로 줄임 => 조건식을 하나 덜씀
		- 문법
		if(조건식){
			실핸문2;
		}
		else{
			실행문2
		}
		*/

		if(면허증 || 민증 || 여권){
			document.write('토익 응시 가능<br>');
		}
		// !면허증 && !민증 && !여권
		else{
			document.write('토익 응시 불가능<br>');
		}
		/*
		if else if문
		- 조건이 3개이상일 때
		- 조건이 2개인데 둘 중 하나가 아닐 때
		- 문법
		// 조건식1이 참이면 실행문1을 실행하고
		if(조건식1){
			실행문1;
		}
		// 위의 조건식이 거짓이고(조건식1이 거짓이고) 조건식2가 참이면 실행문2를 실행해라
		else if(조건식2){
			실행문2;
		}
		// 위의 조건식이 거짓이고(조건식1, 조건식2가 거짓이고) 조건식3이 참이면 실행문3을 실행해라
		else if(조건식2){
		...
		// 위의 조건식이 거짓이고(조건식과 조건식2와 ...가 저밋이면)실행문을 실행해라
		else{
			실행문;
		}
			/*
			
			성적이 90점 이상이고 100점 이하이면 A출력
			
			성적이 80점 이상이고 90미만이면 B로 출력

			성적이 70점 이상이고 80미만이면 C로 출력
			
			성적이 60점 이상이고 70미만이면 D로 출력
			
			성적이 0점 이상이고 60미만이면 F로 출력
			아니면 잘못된 성적이라고 출력
			*/
			//다른 방법 : 조건식이 간단하지만 순서가 중요하다
			if( 성적 < 0 || 성적 > 100 ){
				document.write(성적 + '점은 잘못된 성적<br>');
			}

		
			else if(성적 >= 90){
				document.write(성적 + '학점 A<br>');
			}

			else if( 성적 >= 80 ){
				document.write(성적 + '학점 B<br>');
			}


			else if( 성적 >= 70 ){
				document.write(성적 + '학점 C<br>');
			}

			else if( 성적 >= 60 ){
				document.write(성적 + '학점 D<br>');
			}

			else {
				document.write('잘못된 성적<br>');
			}


			
			let 성적 = 90
			if( 성적 >= 90 && 성적 <= 100 ){
				document.write(성적 + '학점 A<br>');
			}

			else if( 성적 >= 80 && 성적 < 90 ){
				document.write(성적 + '학점 B<br>');
			}


			else if( 성적 >= 80 && 성적 < 80 ){
				document.write(성적 + '학점 C<br>');
			}

			else if( 성적 >= 80 && 성적 < 70 ){
				document.write(성적 + '학점 D<br>');
			}

			else if( 성적 >= 80 && 성적 < 60 ){
				document.write(성적 + '학점 F<br>');
			}

			else {
				document.write('잘못된 성적<br>');
			}

		/*
		중첩 if문
		- if문 안에 if문이 들어가는 형태
		if(조건식){
			if(조건식2){
				실행문1;
			}else{
				실행문2
			}
		}
		- 위 중첩 if문을 일반 if문으로 변경
		if(조건식 && 조건식2){
			실행문1;
		}else if(조건식){
			실행문2;	
		}

	
	*/	



	</script>
</body>
</html>
