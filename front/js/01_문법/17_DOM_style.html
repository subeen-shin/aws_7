<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Document</title>
</head>
<body>
	<!-- 
	숨김 버튼을 클릭하면 박스가 사라지고,
	보기 버튼을 클릭하면 박스가 보이도록 작업 -->
	<button id="hidebtn">숨기</button>
	<button id="showbtn">보기</button>
	<!-- 
	박스의 배경을 하늘색으로, 높이는 200px이 되도록 작업
	 -->
	<div class="box"></div>
	<script>
		/*
		js로 요소의 스타일을 변경하는 방법
		- 요소.style.속성명
		- 속성명이 -로 연결되어 있는 경우 -를 제거한 후 카멜 표기법으로 작성
			- 배경색 변경 : 요소.style.backgroundColor = 
			"red";//style.background-color가 아님 
		*/
		//요소 선택
		const boxE1 = document.querySelector('.box');

		// 요소 배경을 하늘색
		boxE1.style.backgroundColor = "skyblue";

		// 요소 높이를 200px
		boxE1.style.height = "200px" ;

		// 숨김 버튼 선택
		const hidebtnE1 = document.querySelector("#hidebtn")
		hidebtnE1.addEventListener('click', function(){
			boxE1.style.display = "none";
		})

		// 숨김 버튼에 클릭 이벤트 등록
		hidebtnE1.addEventListener('click', function(){
			boxE1.style.display = "none";
		})
		// 보기 버튼 선택
		const showbtn = document.querySelector("#showbtn");

		// 보기 버튼에 클릭 이벤트 등록
		showbtnE1.addEventListener('click', function(){
			boxE1.style.display = "block";
			})
	</script>
	
	
</body>
</html>
