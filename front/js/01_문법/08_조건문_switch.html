<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>switch문</title>
</head>
<body>
	<script>
	/*
	switch문
	- 조건문 중에서 일부만 사용 가능
	- 보통 변수 값이 특정 값을 가지는 지 확인할 때 사용
	switch(변수){
	case 값1:
		실행문;
		break ;
	case 값2:
		실행문2;
		break ;
	defautl:
		실행문3;
		}
	if(변수 == 값1){
		실행문}
	}
	else if(변수 == 값2){
			실행문2;
	}
	else{
		실행문;
	}
	
	*/
	let 월 = 2;
	switch(월){
			case 1: case 3: case 5: case 7: case 8: case 10: case 11:
				document.write(월+"은 31일까지 있습니다.<br>");
				break;
			case 2:
				document.write(월+"은 28일까지 있습니다.<br>");
				break;
			case 4:
				document.write(월+"은 30일까지 있습니다.<br>");
				break;
			}

	</script>
</body>
</html>
