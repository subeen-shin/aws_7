<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Document</title>
</head>
<body>
	<script>
		/*
		반복문
		- 규칙적인 작업을 반복적으로 여러번할 때 사용
		- 예 : 구구단

		for문
		- 문법
		for(초기화; 조건식; 증감식){
			실행문;
		}
			선생님이 학생에게 1부터 10까지 숫자를 세라고 함
			- 초기화 : 조건식이나 실행문에서 사용할 변수를 초기화
				=> 학생이 부를 첫 숫자를 지정.
			- 조건식 : 조건식이 거짓이 되는 순간 반복문을 종료
				=> 숫자를 10까지 부르고 11이 되기전에 멈춤
			- 증감식 : 조선식에서 사용하는 변수를 증가/감소 시켜서 반복 횟수에 영향을 줌
				=>숫자를 1씩 증가
			- 실행문
				=> 숫자를 부름

		- 실행 순서
			- 1. 초기화 => 2. 조건식(참이면) => 3.실행문 => 4.증감식 => 5.조건식(참이면)
			=> 6.실행문 => 7.증감식 => 8.조건식(거짓이면) => 9.종료
		*/
		let 숫자 = 1;
		//여기에 작업하세요. 숫자가 1증가하도록 코드를 변경하세요. 단 alert부분은 수정x
		for(숫자 = 1; 숫자 <= 10; 숫자 = 숫자+1 ){
			document.write(숫자 + '');
		}
		/*
		증감연산자
		- ++, --
		- 변수의 값이 1증가/감소

		let 숫자 = 1;
		for(숫자 = 1; 숫자 <= 10; 숫자 = ++숫자 ){
			document.write(숫자 + '');
		*/
	</script>

</body>
</html>
