<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>객체</title>
</head>
<body>
   
   <script>
      /*
      객체
      - 관련 있는 여러 정보를 묶어서 사용하는 것

      객체 선언 방법
      방법1.
      - {}을 이용 => 재사용이 안됨.
      let 객체명 = {
         속성1 : 값1,
         속성2 : 값2,
         함수1 : function(){}
      }
      
      방법2.
      - 객체 생성함수 이용 => 재사용 가능
      function 함수명(값1, 값2, ...){
         return {
            속성 : 값1,
            속성 : 값2, 
         }
      }
      */
      //이름 : 홍길동, 나이 : 21, 주소 : 서울시
      let 이름 = '홍길동', 나이 = 21, 주소 = '서울시';
      //여러 사람 정보를 관리하기 위해 배열들을 여러개 선언해서 관리
      let 이름들 = ['홍길동', '사람2', '사람3']
      let 나이들 = [21, 20, 30]
      let 주소들 = ['서울시', '경기도', '서울시']

      let 사람1 = {
         이름 : '홍길동',
         나이 : 21,
         주소 : '서울시',
         출력 : function(){
            console.log('이름 : ', 이름, '나이 : ', 나이, '주소 : ', 주소);
         }
      }
      //여러 사람 정보를 관리하기 위해 하나의 객체 배열을 만들어서 관리
      let 사람들 = [
         {   이름 : '홍길동', 나이 : 21, 주소 : '서울시'},
         {   이름 : '사람2', 나이 : 20, 주소 : '경기도'},
         {   이름 : '사람3', 나이 : 30, 주소 : '서울시'},
      ]

			// 객체 생성 방법1.
			let person1 = {
				이름 : '홍길동',
				나이 : 21,
				주소 : '서울시'
			}
			// 객체 생성 방법2.
			function person(이름, 나이, 주소){
				return{
					이름 : 이름,
					나이 : 나이,
					주소 : 주소
				}
			}
			let person2 = person('임꺽정', 30, '한양');
			let person3 = person('둘리', 30, '서울시');
			console.log(person1)
			console.log(person2)
			console.log(person3)

			/*
			객체 사용 방법
			- 객체 안에 변수나 함수를 사용
			객체명.변수
			객체명.함수()
			*/
			console.log(person1.이름)
			console.log(person1.나이)
   </script>
</body>
</html>
