<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>변수 예제</title>
</head>
<body>
	<pre>
		- 변수 종류
		- 변수 선언 방법
		- var와 let의 차이
		- 변수명 작성 규칙/관례

		- 상수 선언 방법
		-상수명 작성 관례
		- 자세한 설명은 script 태그 확인
	</pre>
	
	<script>
		/*
		변수
		- 변하는 수
		- 값을 지정하는 공간

		변수를 선언 방법
		방법1.(고전)
		- ;은 필수가 아니지만 붙이자. 이유는 묻지도 말고 따지지도 말자.
		var 변수명 = 값;
		var 변수명;

		방법2.
		let 변수명=값;
		let 변수명;

		var와 let의 차이
		- let은 중복 선언이 안됨. var는 가능하지만 덮어쓰기
		- let은 호이스팅이 동작하지 않음. var는 호이스팅이 동작.

		변수명 작성 규칙(필수)
		- 숫자로 시작할 수 없음
		- 변수명에 특수문자는 _와 $만 가능
		- 예약어(키워드) 사용 불가
			- 예약어 : 기능이 있는 단어
				예 : var, let
		- 변수명은 대소문자를 구별

		변수명 작성 관례(선택)
		- 변수명은 의미있게 작성
			- a = 1; //??
			- appleCount = 1; //사과 개수
		- 카멜 표기법
			- 두 단어 이상으로 된 변수명은, 두번째 단어부터 첫글자를 대문자로 사용
			- apple + count => appleCount

			/*
			상수 : 변하지 않은 수
			- 숫자에 의미를 부여
			 상수 선언 방법은
			 const 상수명 = 값;

			 변수와 상수의 차이
			 - 상수는 =을 통해 1번만 값을 할당 함
			 - 변수는 =을 통해 값을 여러번 할당할 수 있음

			상수명 작성 관례(선택)
			- 상수명은 모두 대문자로 작성
			- 여러 단어로 된 경우 _를 이용

			*/
			const MAX_SCORE = 100;
			//MAX_SCORE = 200;//에러 발생. 재할당했기 때문




		let NUM2 = 10;
		var num1 = 10;
		var num1 = 20; //중복 선언 가능
		let num2 = 10;
		// let num2 = 20; //중복 선언 불가능 => 에러 발생




	</script>
</body>
</html>
