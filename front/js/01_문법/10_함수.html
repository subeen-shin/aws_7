<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>함수</title>
</head>
<body>
	<script>
		/*
		함수
		- 어떤 기능을 하도록 모아놓은 코드
			=> 누군가에게 일을 시킴
			=> 어떤일, 무엇을 줄건지, 일한 결과물이 무엇인지
			=> 홍길동에게 1 + 2가 얼마인지 계산해서 알려달라고 함
				=> 한 일: 더하기
				=> 뭐가 필요? 두 수가 필요
				=> 결과물 : 더한 결과
			=> 선생님이 청소시키려고 함
				=> 한일 : 청소
				=> 뭐가 필요? 누가, 어디
				=> 결과물 : 없음
		- 장점
			- 재사용을 통해 코드의 길이를 줄임
			- 유지보수가 쉬워짐

		함수 선언 방법
		1. 함수 선언식
		2. 함수 표현식

		1. 함수 선언식
		- 문법
		function 함수이름(매개변수){
			구현;
			return 반환값;//결과물이 없으면 생략 가능
			}
			- 함수이름 : 한 일
			- 매개변수 : 뭐가 필요?. 일을 하기 위해 필요한 정보
			- 반환값 : 결과물. 일을 시킨 사람에게 무엇을 줄 건지
			- 구현 : 일을 어떻게 할 건지 작성

		함수 호출 => 실제 일을 시킴
		- 리턴타입이 있는 경우
		let 변수 = 함수명(값1, 값2);
		- 결과물이 없는 경우
		함수명(값1, 값2);
		function 두수를더해서알려줌 함수명 add(매개변수){
			let sum = num1 + num2;
			return 두수의합 값 sum;
		}
		*/

		function add(num1, num2){
			let sum = num1 + num2;
			return sum;
		}

		let num1 = 1, num2 = 2;
		let result = add(num1,num2);
		document.write(`${num1} + ${num2} = ${result}<br>`);

		/*
		앞에서 했던 구구단 예제를 참고해서 num단을 출력하는 함수를 만드세요
		그리고 호출해서 화면에 구구단 num단이 출력되도록 작성
		할 일 : 주어진 단을 출력
		매개변수 : 출력할 단
		결과물 : 없음 
		*/
		function 구구단(단){
			//구구단 출력
		
		let 숫자 = 1;
		for(숫자 = 1; 숫자 <= 9 ; ++숫자 ){
			document.write(`${단} X ${숫자} = ${단 * 숫자}<br>`);
		}
	}
		document.write('<h1>구구단 예제</h1>');
		let 단; 
		for (단 = 2; 단 <= 9; ++단){
		 구구단(단);
		}
	
		/*
		홀짝을 판별하는 함수를 만들고 호출해서 결과를 확인하세요
		*/
		/*
		함수1
		기능 : 수가 주어지면 짝수인지 알려주는 함수
		매개변수 : 수
		결과물 : 홀수이면 false, 짝수이면 true
		
		함수2
		기능 : 수가 주어지면 홀수인지 짝수인지 화면에 출력하는 함수
		매개변수 : 수
		결과물 : 없음
		*/
		//함수1 : 짝수인가(isEven)
		function 짝수인가(수){
			if(수 % 2 == 0){
				return true;
			}
		 else{
				return false;
		 }
		}
		function 홀짝판별(수){
				if(수 % 2 == 0){
					document.write(`${수}은 짝수<br>`)
				}
				else{
		document.write(`${수}은 홀수<br>`);
			}
		}

		document.write('<h1>홀짝 판별 예제</h1>');
		숫자 = 10;
		document.write(`${숫자}는 짝수인가? ${짝수인가(숫자)}<br>`)
		홀짝판별(숫자);
 

	
	</script>
	
</body>
</html>
