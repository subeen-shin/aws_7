<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>js 적용 방법</title>
	<!-- 
	방법1.
	- script 태그 안에 js 코드를 작성
		- head태그에 작성하는 것과 body태그 하단에 작성하]는 것에는 약간의 차이가 있음
		- head태그에 작성하면 body태그가 구성되기 전에 이벤트가 등록되기 때문에
			상황에 따라 이벤트가 실행 안될 수 있음	
	방법2.
	- script 태그를 이용하여 만들어진 js를 가져다 연결
	방법3.
	- 태그에 이벤트 속성을 활용
	-->
	<script>
		//한줄 주석
		/*
		여러줄 주석 : 위치에 상관 없이 이 사이 안에 있는 문자들이 주석
		*/
		//방법1
		alert('알림창 : 방법1')
	</script>
	<script src="/js/01_문법/01_js 적용.js">

	</script>
</head>
<body>
	<button onclick="alert('방법')">클릭</button>
	<script>
		alert('알림창 : 1-2')
	</script>
</body>
</html>
