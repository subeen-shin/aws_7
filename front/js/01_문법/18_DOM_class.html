<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Document</title>

	<style>
		.box{
			width: 100px; height: 100px; background-color: yellow;
			border: 3px solid transparent ;
		}
		.bg-red{
			background-color: red;
		}
		.border{
			border-color: black;
		}
		.box2{
			height: 200px; border: 3px solid transparent; background-color: brown;
		}

	</style>
</head>
<body>
	<div>
		<button id="btn1">빨간 배경으로</button>
		<button id="btn2">빨간 배경 제거</button>
		<button id="btn3">빨간 배경 추가/제거</button>
		<button id="btn4">박스2로 변경</button>
		<button id="btn5">박스1로 변경</button>
	</div>
	<div class="box"></div>
	<script>
		/*
		class 속성의 값들을 확인하거나 가져오거나 변경하는 작업을
		통해 요소에 스타일을 적용
		
		요소.calssList
		- 요소의 클래스 목록을 가져옴
		요소.calssList.add(클래스A)
		- 요소에 클래스A를 추가
		요소.calssList.remove(클래스A)
		- 요소에 클래스A가 있으면 제거, 없으면 추가
		요소.calssList.contains(클래스A)
		- 요소에 클래스A가 있으면 true, 없으면 false
		요소.calssList.replace(클래스A, 클래스B)
		- 요소에 있는 클래스A를 클래스B로 변경
		요소.calssList.item(위치 A)
		- 요소에 위차A에 있는 클래스를 가져옴
		*/

		// 배경을 빨강으로 바꾸는 작업
		// 공통 box 요소 선택
		const box = document.querySelector(".box");

		// 1. 요소 선택
		const btn1 = document.querySelector('#btn1');
		// 2. 이벤트 등록
		btn1.addEventListener('click', function(){
			//box 요소에 bg-red 클래스 추가
			box.classList.add('bg-red')
		})

		//배경 빨강을 제거하는 작업
		// 1. 요소 선택
		const btn2 = document.querySelector('#btn2');
		// 2. 이벤트 등록
		btn2.addEventListener('click', function(){
			// box 요소에 bg-red 클래스 제거
			box.classList.remove('bg-red')
		});

		// 배경 빨강<->노랑 작업
		// 1.요소 선택
		const btn3 = document.querySelector('#btn3');
		// 2. 이벤트 등록
		btn3.addEventListener('click', function(){
			// // box 요소에 bg-red 클래스 제거
			// if(box.classList.contains('bg-red')){
			// 	box.contains.remove('bg-red');
			// }
			// // 없으면 추가
			// else{
			// 	box.classList.add('bg-red');
			// }
			box.classList.toggle('bg-red');
		});

		// 박스1=>박스2로 변경
		// 1.요소 선택
		const btn4 = document.querySelector('#btn4');
		// 2. 이벤트 등록
		btn4.addEventListener('click', function(){
			// 박스=>박스2로 변경
			box.classList.replace('box', 'box2');
		});

		// 박스2=>박스1로 변경
		// 1.요소 선택
		const btn5 = document.querySelector('#btn5');
		// 2. 이벤트 등록
		btn5.addEventListener('click', function(){
			// 박스=>박스2로 변경
			box.classList.replace('box2', 'box');
		});

	
		
	
	</script>
</body>
</html>
