	<!-- 
	1. JS 적용 방법
	2. 변수
	- 변수 선언 방법
	let 변수명 = 값;
	var 변수명 = 값;
	- let : 중복 선언이 불가능(같은 범위 안에 있으면
	- var : 중복 선언이 가능

	- 변수명 작성 규칙(필수)/관례(선택)
	- 변수와 =
	- 상수 선언 방법
		- 상수 : 변하지 않은 수 => 값을 한번만 지정할 수 있음
		- 상수는 초기화 하지 않으면 에러 발생
	
	3. 자료형
	- 변수에 저장된 값에 따라 자료형이 정해진다

	4. 연산자
	- 연산자 종류에 따라 결과를 예상할 수 있다
	- 연산자 종류
	- 산술 연산자 : +,-,*,/,%,**
		=> 결과가 숫자
	- 비교 연산자 : <,>,<=,>=,==,===,!=,!==
		=> 결과가 참 또는 거짓
	- 논리 연산자 : &&, ||, !
		=> 결과가 참 또는 거짓
		-! : 반대. 참이면 거짓, 거짓이면 참
			- 성인이 아니면 => 미성년자
			- !성인 => 미성년자
		`&& : ~이고, 둘다 참이면 참
			- 티켓이 있고, 신분증이 있어야 콘서트 관람 가능
			- 티겟 && 신분증
		- || : ~이거나, 하나라도 참이면 참
			- 민증이 있거나 면허증있거나 여권이 있으면 응시 가능
			- 민증 || 면허증 || 여권
		- SCE(단락 회로 평가) : 논리 연산 중 앞의 결과에 의해 최종결과가 정해지는 경우 뒤 결과는
		확인하지 않음
		- 대입연산자 : =
			- 오른쪽에 있는 값을 왼쪽에 저장
			a = 10; //10을 a에 저장
			10 = a; //a의 값을 상수 10에 저장하려고 해서 문제가 생김

		5. 자료형변환
		- 자료형을 일시적으로 변환
		- parseIint, parseFloat. Nummver

		6. 조건문
		~하면 ...해라 => 조건문 사용

		if(조건식1){
		실행문1;
		}

		else if(조건식2){
		실행문2;
		}

		else ()
		else if와 else는 없을 수 있음
			if : '조건식1'이 참이면 '실행문1'을 실행하고 해당 조건문은 끝내라
			else if : 위의 '모든 조건식(조건식1)'이 거짓이고 '조건식2'가 참이면
			'실행문2'를 실행하고 해당 조건문을 끝내라
			else : 위의 '모든 조건식(조건식1과 조건식2)'이 거짓이면 '실행문3'을 실행하고 해당 조건문을 끝내라

		switch문
		- 조건문 중 일부만 적용 가능
		- 값을 몇 개만 사용하는 경우
					@계절을 판별하는 예제
					=> 1~12월 중 각 어느 계정에 속하는지 판별
			- 문법

				switch(변수){
				case 값1:
					실행문1;
					break;
				case 값2:
					실행문2;
					break;
				//...
				defualt:
					실앻문3;} 
					
					case의 '값'으로 상수만 올 수 있음
						실수는 올 수 없음
					defualt는 else에 해당
					'실행문'을 실행하고' break'를 만나지 못하면 다음 '실행문'으로 이동
					
			반복문
			규칙적인 작업을 반복해서 여러번 할 때 사용

			for문
			- 문법

				for(초기화; 조건식; 증감식){
				실행문;
				}

			- 초기화
				보통 조건식에서 사용하는 볁수를 초기화
				생략 가능

			- 조건식
				반복문을 실행할지 종료할지를 판별하는 곳
				조건식이 참이면 실행문으로 이동하고, 거짓이면 반복문을 종료
				조건식에 따라 반복문이 한 번도 실행되지 않을 수 있음	
				생략 가능 => 하면 무조건 참이 된다
			
			- 증감식
				보통 조건식에서 사용하는 변수를 증가하거나 감소시킴
				생략 가능

				반복 횟수 : 초기화 조건식 증감식

				실행순서 
					초기화 > 조건식(참) > 실행문 > 증감식 >
					조건식 (참) > 실행문 > 증감식 >
					...조건식이 참이면 계속 반복
					조건식 (거짓) > 반복문 종료


				함수

				선언 방법

				1. 함수 선언식
						문법

								function 함수명(매개변수1, 매개변수2, ...){
								실행문;
								 return 변환값;
								 }

					매개변수
					일을 할 때 필요한 필수 정보

					변환값
					일을 다 끝나고 일 시킨 사람에게 넘겨줄 정보
					반환값이 없는 경우 return 생략가능

					return
						return을 만나면 하던거 멈추고 일 끝냄
						반환값이 
				2.함수


				함수 사용방법

				//반환값이 있는 경우
				let 변수명 = 함수명(값1, 값2, ...)
				let name = prompt("이름을 입력하세요");

				//반환값이 없는 경우
				함수명(값1, 값2, ...)
				console.log('안녕')

				
			익명 함수
			- 이름이 없는 함수


		### 언제?

	- 함수의 매개변수로 다른 함수가 필요한 경우가 있음
	- 이때, 필요한 다른 함수가 여기에서만 사용되는 경우 익명 함수를 활용
	- 예시
    
    [1,2,3].forEach(function (매개변수1, 매개변수2, ..){
    	구현;
    	return 반환값;
    })
    
		화살표 함수

		- 익명 함수의 다른 표현 방법
	- 코드가 간결해질 수 있어서 사용
	- 'function' 키워드 사용하지 않고 =>를 사용
	- 문법
    
    (매개변수1, 매개변수2, ...) =>{
    	구현;
    	return 반환값;
    }
  
    
   -----예시
	 	[1,2,3].forEach((매개변수1, 매개변수2, ..) =>{
			구현;
			return 반환값;
		})

		화살표 함수 간략화
		- 매개변수가 1개이면 ()를 생략할 수 있음

		매개변수1 =>{
		구현;
		return 반환값;
		}
		
		- 실행문이 1줄(return 포함)이면 {}를 생략할 수 있음
		- 이때 `return`이 있는 경우 `return`을 생략할 수 있음

		매개변수1 =>	반환값;
		//아래 익명함수는 위 화살표 함수와 동일한 기능
		function (매개변수1){
		return 반환값;
		}
