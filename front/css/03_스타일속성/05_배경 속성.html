<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>배경 속성 예제</title>
	<style>
		/* 
		background-color(p.127)
		-배경색

		background-image(p.129)
		- 배경 이미지
		- url()함수 이용
		- url(이미지 경로)
		- 네이버의 경우 아이콘을 배경 이미지로 처리

		background-repeat
		- 배경 이미지 반복
		- 요소가 이미지보다 클때 의미가 있음
		- 값
			- repeat : x축, y축 반복
			- repeat-x : x축만 반복으로 채움(옆으로)
			- repeat-y : y축만 반복으로 채움(아래로)
			- no-repeat : 반복 안함

			background-possition
			- 배경 미미지의 시작 위치를 지정
			- 값
				- 고정 px. %
				- left, center, right : x축 방향
				- top, center, bottom : y축 방향

			background- size
			- 배경 이미지 크기를 변동
			- 너비 높이 순으로 입력
			- 값
				- 고정 px, %
				- auto : 이미지 원본 크기. 기본값
				- contain : 이미지가 요소 안으로 들어갈 수 있게 확대/축소. 여백이 생길 수 있음
				- cover : 요소를 이미지가 덮을 수 있도록 확대/축소. 여백이 안 생김

			background-attachment
			- 배경 이미지를 고정하는 속성
			- 값
				- scroll : 기본값, 배경 이미지가 움직임
				- fixed : 배경 이미지가 움직이지 않게 고정

			background-clip
			- 박스 모델에서 배경 범위를 정하는 속성
				- border-box : 테두리까지 배경을 봄
				- padding-box : 패딩까지 배경으로 봄
				- content-box : 컨텐츠만 배경으로 봄

			background-origin
			- 배경 이미지를 배치할 기준
			- 값
				border-box : 테두리부터 배경 배치
				- padding-box : 패딩부터 배경 배치
				- content-box : 컨텐츠부터 배경 배치
		*/

		.box{
		/* 테두리가 있는 박스(결과 확인 용이) */
			width: 200px; height: 200px; border: 10px solid black; padding: 5px; 
			margin-bottom: 10px;}
		/* 다른 박스랑 겹치지 않게 */

		.bg-color1{ background-color: cadetblue;}
		.bg-color2{ background-color: bisque;}

		.bg-img1{ background-image: url(../../img/가나디.jpeg)}
		.bg-img2{ background-image: url(/img/가나디.jpeg);}

		.bg-size1{ background-size: 50% 50%;}
		.bg-size2{ background-size: contain; background-position: center;}
		.bg-size3{ background-size: cover;}
		
		.bg-repeat1{ background-repeat: repeat-x;}
		.bg-repeat2{ background-repeat: repeat-y;}
		.bg-repeat3{ background-repeat: no-repeat;}

		.bg-pos1{ background-position: 30px 30px;}
		.bg-pos2{ background-position: -30px -30px;}

		.bg-fixed {background-attachment: fixed;}

		.bg-clip1{ background-clip: border-box; border-color: transparent;}
		.bg-clip2{ background-clip: padding-box; border-color: transparent;}
		.bg-clip3{ background-clip: content-box; border-color: transparent;}
		body{background-color: rgb(188, 230, 178);}

		.bg-origin1{ background-origin: border-box; border-color: transparent; background-repeat: no-repeat;}
		.bg-origin2{ background-origin: padding-box; border-color: transparent; background-repeat: no-repeat;}
		.bg-origin3{ background-origin: content-box; border-color: transparent; background-repeat: no-repeat;}
		body{background-color: rgb(188, 230, 178);}

		/* 
		background : 배경 속성을 한번에 지정하는 단축 속성
		- (background) color /image /attachment/ clip/origin /size 순으로 작성하며 한번에 적용 
		*/

		.bg{
			background-color: azure;
			background-image: url(../../img/가나디.jpeg);

			background: gray url(../../img/가나디.jpeg) no-repeat top left / 50% ;
	 	  background-repeat: no-repeat;
			background-position: top left;
			background-size: 50% 50%;
		
}
	</style>
</head>
<body>
	<div class="container1">
		<h1>배경 색</h1>
		<div class="box bg-color1"></div>
		<div class="box bg-color2"></div>
	</div>

	<div class="container2 ">
		<h1>배경 이미지</h1>
		<div class="box bg-img1"></div>
		<div class="box bg-img2"></div>
</div>
<div class="container3">
			<h1>배경 크기</h1>
			<div class="box bg-size1 bg-img1" ></div>
			<div class="box bg-size2 bg-img1" ></div>
			<div class="box bg-size3 bg-img1" ></div>
		</div>
<div class="container4">
		<h1>배경 반복</h1>
		<div class="box bg-img1 bg-size1 bg-repeat1"></div>
		<div class="box bg-img1 bg-size1 bg-repeat2"></div>
		<div class="box bg-img1 bg-size1 bg-repeat3"></div>
</div>

<div class="container5">
	<h1>배경 위치</h1>
	<div class="box bg-img1 bg-pos1"></div>
	<div class="box bg-img1 bg-pos2"></div>
	<div class="box bg-img1 bg-pos3"></div>
</div>

<div class="container6">
	<h1>배경 고정</h1>
	<div class="box bg-img1 bg-fixed"></div>	
</div>

<div class="container7">
	<h1>배경 범위</h1>
	<div class="box bg-img1 bg-clip1"></div>	
	<div class="box bg-img1 bg-clip2"></div>
	<div class="box bg-img1 bg-clip3"></div>
</div>

<div class="container8">
	<h1>배경 시작위치</h1>
	<div class="box bg-img1 bg-origin1"></div>	
	<div class="box bg-img1 bg-origin2"></div>
	<div class="box bg-img1 bg-origin3"></div>
</div>

<div class="container9">
	<h1>배경</h1>
	<div class="box bg"></div>	
	<div class="box bg-img1 "></div>
	<div class="box bg-img1 "></div>
</div>
</body>
</html>
