<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>테이블 속성</title>
	<style>
		/* 
		border-collapse
		- td/th 테두리와 table 테두리를 합칠건지 각각 보여줄건지를 결정
		- 값
		  - seperate : 기본값, 각각
			- collapse : 합침
		
		table-layout
		- 첫 tr태그의 td/th 너비가 지정된 경우 지정된 너비를 고정으로 할지 비례해서 자동으로 커지게 할지를 결정
		- auto : 기본값, 자동으로 비례해서 커짐
		- fixed : 고정. 이 값으로 안하면 칸 안에 값이 달라지면 각 칸의 너비가 매번 달라짐

		empty-cells
		- 조건 : border-collapse : seperate일 때 적용
		- 비어 있는 th/td를 어떻게 보여줄지를 결정
		- hide : 안 보여줌(테두리도)

		border-spacing
		- 조건 : border-collapse : seperate일 때 적용
		- 테두리 사이의 간격
		- 수평 수직 순으로 설정
		*/
		table{ 
			border: 1px solid black; 
			margin-bottom: 10px;
			width: 100%;
		}
		td, th{ 
			border: 1px solid black; 
		}
		.table-collapse{
			border-collapse: collapse;
		}
		.table-fixed{
			table-layout: fixed;
		}
		.table-empty{
			empty-cells: hide;
			border-spacing: 10px 20px;
		}
	</style>
</head>
<body>
	<h1>테이블 속성 예제</h1>
	<h2>기본 테이블</h2>
	<table class="table">
		<thead>
			<tr>
				<th>번호</th>
				<th>제목</th>
				<th>작성자</th>
				<th>조회수</th>
			</tr>
		</thead>
		<tbody>
			<tr>
				<td>2</td>
				<td>게시글입니다.</td>
				<td>관리자</td>
				<td>10</td>
			</tr>
			<tr>
				<td>1</td>
				<td>공지사항입니다.</td>
				<td>관리자</td>
				<td></td>
			</tr>
		</tbody>
	</table>
	<h2>border-collapse:collapse 테이블</h2>
	<table class="table table-collapse">
		<thead>
			<tr>
				<th>번호</th>
				<th>제목</th>
				<th>작성자</th>
				<th>조회수</th>
			</tr>
		</thead>
		<tbody>
			<tr>
				<td>2</td>
				<td>게시글입니다.</td>
				<td>관리자</td>
				<td>10</td>
			</tr>
			<tr>
				<td>1</td>
				<td>공지사항입니다.</td>
				<td>관리자</td>
				<td>100</td>
			</tr>
		</tbody>
	</table>
	<h2>table-layout:fixed 테이블</h2>
	<table class="table table-fixed">
		<thead>
			<tr>
				<th>번호</th>
				<th>제목</th>
				<th>작성자</th>
				<th>조회수</th>
			</tr>
		</thead>
		<tbody>
			<tr>
				<td>2</td>
				<td>게시글입니다.</td>
				<td>관리자</td>
				<td>10</td>
			</tr>
			<tr>
				<td>1</td>
				<td>공지사항입니다.</td>
				<td>관리자</td>
				<td>100</td>
			</tr>
		</tbody>
	</table>
	<h2>empty-cells, 테두리 간격 예제</h2>
	<table class="table table-empty">
		<thead>
			<tr>
				<th>번호</th>
				<th>제목</th>
				<th>작성자</th>
				<th>조회수</th>
			</tr>
		</thead>
		<tbody>
			<tr>
				<td>2</td>
				<td>게시글입니다.</td>
				<td>관리자</td>
				<td>10</td>
			</tr>
			<tr>
				<td>1</td>
				<td>공지사항입니다.</td>
				<td>관리자</td>
				<td></td>
			</tr>
		</tbody>
	</table>
</body>
</html>
