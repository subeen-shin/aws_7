<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>복습</title>
	<style>
		/* 
		태그의 구성
		1. 단일 태그
		<태그명 속성-"값" 속성 예시: class="값1 값2"  id="값">
		
		2. 쌍태그
		<태그명 속성-"값" 속성 / 예시: class="값" id="값"></태그명>
		*/

		/* 기본 선택자
		1. 모든 선택자 0
		*{} : 글꼴, 여백 제거

		2. 태그 선택자 1
		a{} - a에 태그 이름을 써줌 : 밑줄이나 글자색을 변경

		3. 클래스 선택자 10
		.값1{}

		4. 아이디 선택자 100
		#id1{}

		우선 순위가 필요한 이유?
		- 누군가 같은 일(스타일)을 시킬 때  누구 말을 들을지 결정하기 위해
			=> 우선순위가 노픙ㄴ 선택자 말을 따르면 됨
			=> 같으면? 코드 순서상 나중(밑)에 있는 선택자를 따르면 됨



		*/
			a {
				color: rgb(179, 63, 98); text-decoration: none;
			}


	</style>

</head>
<body>
	<a href="//naver.com" target="_blank">네이버 이동</a>
	<!-- target_ blank 안하면 그 페이지에서 네이버 열림
	 blank해줘야 새탭에서 열림-->
</body>
</html>
