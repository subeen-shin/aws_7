<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Document</title>
	<style>
		.container{border: 3px solid black; width: 500px; background-color: aqua;}
		.warp{padding: 10px;}
		.box{ background-color: red; height: 100px; width: 210px;
		float: left; box-sizing: border-box;} 
		.box+.box{ margin-left: 10px;}


	</style>
</head>
<body>
	<div class="container">
		<div class="warp">
			<div class="box"></div>
			<div class="box"></div>
		</div>
	</div>
</body>
