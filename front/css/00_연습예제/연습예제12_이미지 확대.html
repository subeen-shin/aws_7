<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>이미지 확대 예제</title>
	<style>
		.box{ width: 150px;}
		.warp{ 
			width: 100%;  height: 150px;
			/* 이미지를 확대했을 때 넘어가는 부분이 안보이게 하기 위해 */
			overflow: hidden;
			/* 둥근 테두리 */
			border-radius: 4px;
			/*  */
			box-shadow: 0 0 2px 0 rgba(0, 0, 0, 1)
		}
		.title{ 
			/* 글자 한줄의 높이를 20px 고정 => 높이가 20px로 고정 */
			line-height: 20px;
			/* 시작 글자와 이미지 사이의 간격을 띄움 */
			margin-top: 5px;}
		.line{ display: block;}
		.box:hover img{ transform: scale(1.5);}
		.box:hover .line{text-decoration: underline;}
		.box img{
			transition-duration: 500ms, 500ms;
			transition-delay: 0s, 0s;
		transition:0.7s;}
	


	</style>
	
</head>
<body>
	<div class="box">
		<!-- 이미지가 들어갈 박스 -->
		<div class="warp">
			<img src="../../img/가나디.jpeg" alt="가나디" width="150" height="130">
		</div>
		<!-- 이미지 설명 문구 -->
		<div class="title">
			<span class="line">이 이미지는...</span>
			<span class="line">좋습니다....</span>
		</div>
	</div>
	

</body>
</html>
