	<style>
		
		.container{ 
			width: 150px;  height: 150px; overflow: hidden;
			/* 박스 그림자로 테두리 효과 적용 */
			box-shadow: 0 0 2px 0 rgba(0, 0, 0, 1) ;
			/* 둥근 테두리 */
			border-radius: 4px;
			position: relative;
	}
	.box{
		/* 박스를 absolute로 container 전체를 감싸도록 배치 */
		position: absolute;
		left: 0; right: 0;
		top: 0; bottom: 0;
		background: white;
		padding: 60px 0;
		line-height: 30px;
		font-size: 18px;
		text-align: center;
		display: none;
	}
	.container:hover .box{
		display: block;
	}

	</style>
