<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>박스 예제</title>

	<style>
.squre {height: 120px; width: 300px; 
	border: 2px solid black; margin-bottom: 10px;}


.box{ background-color: red; height: 100px; width: 280px;}
.squre>.box {margin: 10px;}

/* padding을 이용한 배치: 너비나 높이를 계산하지 않아도됨 */
.squre2{ width: 300px; height: 180px; border: 3px solid black;}
.warp {padding: 10px;}
.squre2>.box{ width: 100%; height: 100px; background-color: red;}

	</style>
</head>
<body>
	<!--  컨테이너의 너비가 300, 안에 들어가는 박스 높이 100px 둘 사이의 여백은 10px-->
 <div class="squre">
		<div class="box"></div>
</div>

<div class="squre2">
	<div class="warp"></div>
		<div class="box"></div>
</div>

</body>
</html>
