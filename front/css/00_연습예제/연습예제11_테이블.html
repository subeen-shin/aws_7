<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>테이블 예제</title>
	<style>
		table{
			border-top: 1px  solid black;
			margin-bottom: 10px;
			width: 100%;
		}
		td, th{ 
			/* border: 1px solid black */
			/* 방법1.
			위 테두리 : 1px solid black 
			아래 테두리 : 1px solid black 
			*/
			/* 방법2.
			전체 테두리 : 1px solid black
			왼쪽테두리스타일: none
			오른쪽테두리스타일: none
			*/
			/* 방법3.
			전체 테두리 지정
			왼쪽테두리두께: 0
			오른쪽테두리두께: 0
			*/
			border-bottom: 1px solid black; }
		.table{
			border-collapse: collapse;
		}
		.udl{text-decoration: underline ; color: blue;}
		tbody > tr:hover{background-color: rgb(161, 200, 255);}
	</style>
</head>
<body>
	<h1>테이블 속성 예제</h1>
	<h2>기본테이블</h2>
	<table class="table" >
		<thead>
			<tr>
				<th>번호</th>
				<th>제목</th>
				<th>작성자</th>
				<th>조회수</th>
			</tr>
		</thead>
		<tbody>
			<tr>
				<td>2</td>
				<td class="udl">게시글입니다.</td>
				<td>admin</td>
				<td>10</td>
			</tr>
		</tbody>
		<tbody>
			<tr>
				<td>1</td>
				<td class="udl">공지사항 필독!</td>
				<td>admin</td>
				<td>100</td>
			</tr>
		</tbody>
	</table>
</body>
</html>
