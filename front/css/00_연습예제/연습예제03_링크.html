<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>연습예제</title>
	<style>
		a{color: black; text-decoration: none;}

		a:hover {text-decoration: underline;}

		a.visited {color: red;}

		
		

	</style>
</head>
<body>
	<!-- 
	a태그의 글자색을 검정색으로 바꾸세요 
	a태그를 hover하면 글자에 밑줄이 생기게 바꾸세요
	해당 링크를 방문하면 글자가 두껍게 되도록 바꾸세요
	-->
<div class="container1">
	<a href="//naver.com" class="visited" target="_blank">네이버로 이동</a>
	</div>
</body>
</html>
