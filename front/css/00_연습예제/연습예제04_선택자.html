<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>선택자</title>
	<style>
		.red{ color: red;}
		.yel{ background-color: yellow;}
		.udl {text-decoration: underline;}
		.hv:hover{ font-weight: bold;}

		#item1{ color: red;}
		#item2{ background-color: yellow;}
		#item3:hover { font-weight: bold;}
		#item4{ text-decoration: underline; background-color: yellow;}

		.color-red{ color: red}
		.bg-yellow{ background-color: yellow;}
		.hover-bold:hover{ font-weight: bold;}
		.underline{ text-decoration: underline;}

		.list3 > li:first-of-type{ color: red;}
		.list3 > :nth-child(even){ background-color: yellow;}
		.list3 > li:nth-of-type(3):hover {font-weight: bold;}
		.list3 > :last-child{ text-decoration: underline ;}


	</style>
</head>
<body>
	<h1>선택자 예제</h1>
	<!-- 
	1에는 글자가 빨강, 4에는 글자가 밑줄
	2와 4는 배경이 노랑, 3은 hover하면 글자가 두껍게 -->
	
	<ul>
		<li class="red">1</li>
		<li class="yel">2</li>
		<li class="hv">3</li>
		<li class="udl yel">4</li>
	</ul>

	<ul class="list1">
		<li id="item1">1</li>
		<li id="item2">2</li>
		<li id="item3">3</li>
		<li id="item4">4</li>
	</ul>

	<ul class="list2">
		<li class="color=red">1</li>
		<li class="bg-yellow">2</li>
		<li class="hover-bold">3</li>
		<li class="bg-yellow underline">4</li>
	</ul>

	<ul class="list3">
		<li id="item1">1</li>
		<li id="item2">2</li>
		<li id="item3">3</li>
		<li id="item4">4</li>
	</ul>
</body>
</html>
