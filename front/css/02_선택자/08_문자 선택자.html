<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>문자 선택자</title>
	<style>
		/* 
		선택자::selection{} 
		- 드래그된 글자들을 선택

		선택자::before{}
		- 요소 앞에 글자를 추가. before로 추가된 요소는 드래그로 잡히지 않음
		- 글자 추가 이외의 다양한 작업을 할 수 있음
		- content 속성을 이용하여 글자르 추가. 글자를 추가하지 않더라도 content는 반드시 필요

		선택자::after{}
		- 요소 뒤에 글자를 추가. 내용은 ::before와 동일
		- float 속성에서 자주 사용

		*/
		p::selection{
			background-color: aqua;}
		span::before{ content: '제 이름은';}
		span::after{ content: '입니다';}
	</style>
</head>
<body>
	<h1>문자 선택 예제</h1>
	<p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Corrupti nemo delectus praesentium id dignissimos deserunt necessitatibus rem quasi minima sapiente!</p>
	<span>홍길동</span>
</body>
</html>
