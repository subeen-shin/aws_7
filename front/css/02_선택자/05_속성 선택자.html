<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>속성 선택자 예제</title>
	<style>
		/* 
		속성 선택자(p.83)
		- 태그의 속성을 이용한 선택자
		- [속성명] : 해당 속성을 가진 요소
		- [속성명=값] : 속성명의 값이 일치하는 요소를 선택

		문자열 속성 선택자
		- 속성 값에 특정 문자열이 있는지 확인할 때 사용

[속성^=A]
		- 속성의 값이 A를 단어로 시작하는 요소를 선택
			- class="A B" O
			- class="A-B" O
			- class="B-A" X
			- class="B A" X
			- class="AB" O
			- class="BA" X

[속성$=A]
		- 속성의 값이 A로 끝나는 요소를 선택
			- class="A B" X
			- class="A-B" X
			- class="B-A" O
			- class="B A" O
			- class="AB" X
			- class="BA" O

[속성~=A]
		- 속성의 값이 A를 단어로 포함하는 요소를 선택
			- class="A B" O
			- class="A-B" X
			- class="B-A" X
			- class="B A" O
			- class="AB" X
			- class="BA" X

[속성|=A]
		- 속성의 값이 A- 단어로 시작하는 요소를 선택
			- class="A B" X
			- class="A-B" O
			- class="B-A" X
			- class="B A" X
			- class="AB" X
			- class="BA" X

[속성*=A]
		- 속성의 값이 A를 포함하는 요소를 선택
			- class="A B" O
			- class="A-B" O
			- class="B-A" O
			- class="B A" O
			- class="AB" O
			- class="BA" O

		*/
		[type]{color: red;}
		[type=text]{ background-color: rgb(255, 208, 218);}

		[class~=A]{ color: red;}
		[class|=A]{ font-size: 24px;}
		[class^=A]{ background-color: chartreuse;}
		[class$=A]{ font-weight: bold;}
		[class*=A]{ border: 1px solid black;}


	</style>
</head>
<body>
	<div class="container1">
		<h1>고성 선택자 예제</h1>
		<input type="text" value="안녕하세요">
		<input type="password" value="안녕하세요">
		<span>안녕하세요</span>
	</div>
	<div class="container2">
		<h1>문자열 속성 선택자 예제</h1>
		<ul>
			<li>~=A : 빨강 글자</li>
			<li>|=A : 글자 크기 24px</li>
			<li>^=A : 배경 노랑</li>
			<li>$=A : 글자 두껍게</li>
			<li>*=A : 테두리</li>
		</ul>
		<div class="A B" >"A B"</div>
		<div class="A-B" >"A-B"</div>
		<div class="B-A" >"B-A"</div>
		<div class="B A" >"B A"</div>
		<div class="AB" >"AB"</div>
		<div class="BA" >"BA"</div>
	</div>
</body>
</html>
