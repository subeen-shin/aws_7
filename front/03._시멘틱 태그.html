<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>시멘틱 태그 예제</title>
</head>
<body>
	<!-- 
	p.39
	시멘틱 태그
	- 기능 없음(div와 같음)
	- 의미를 부여할 때 사용 
	- 종류
		- header : 상단 콘텐츠, 웹 문서의 머리말
		- nav : 메뉴를 그룹화
		- figure : 멀티미디어 콘텐츠를 그룹화
		- main : 문서의 핵심 영역
		- aside : 부가 콘텐츠, 광고
		- section : 콘텐츠의 그룹화
		- article : 개별 콘텐츠
		- footer : 하단 콘텐츠
		-->
		<!-- 
		ctrl+엔터하면 주석이 밑으로 안내려가고 줄만 바뀜 
		-->
		<header>
			<nav>메뉴들 배치</nav>
		</header>
		<main>
			<section>
				<article>콘텐츠1</article>
				<article>콘텐츠2</article>
				<article>콘텐츠3</article>
			</section>
		</main>
		<footer>푸터</footer>
</body>
</html>
