<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Document</title>
</head>
<body>
	<!-- 
	회원 가입을 위한 화면을 구성하세요.
	입력 정보 : 아이디. 비번, 비번확인, 이메일, 성별
	 -->
<h1>회원가입</h1>
<form action=""method="get"></form>
<div>
		<label for="id">아이디</label>
		<div>
			<input type="text" name="id" placeholder="아이디" required>
		</div>
	</div>
<div>
		<label for="pw">비번</label>
		<div>
			<input type="password" name="pw" id="pw" placeholder="비밀번호" required>
		</div>
	</div>
<div>
		<label for="pw2">비번확인</label>
		<div>
			<input type="password" name="pw2" id="pw2" placeholder="비번확인">
		</div>
	</div>
	<div>
		<label for="email">이메일</label>
		<div>
			<input type="email" name="email" id="email" placeholder="이메일">
		</div>
	</div>
	<div>
		<label>성별</label>
		<div>
			<label>
				<input type="checkbox" name="gender" value="male">남성
			</label>
			<label>
				<input type="checkbox" name="gender" value="female">여성
			</label>
		</div>
	</div>
	<button>회원가입</button>
<input type="password" name="pw" placeholder="비밀번호">

</body>

</html>
