<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Document</title>
</head>
<body>
	<!-- 
	p.51
	ul 태그
	- 순서가 없는 목록을 지정할 때 사용
	- li 태그와 함께 사용
	- type 속성을 이용하여 마커 모양을 바꿀 수 있지만 비추천
		스타일을 이용하여 설정하는 것이 좋음

	ol 태그
	- 순서가 있는 목록을 지정할 때 사용
	- li 태그와 함께 사용
	- type 속성을 이용하여 마커 모양을 바꿀 수 있지만 비추천
		스타일을 이용하여 설정하는 것이 좋음
	- start 속성을 이용하여 시작 숫자를 설정
	
	dl 태그
	- 단어를 정의할 때 사용하는 태그
	- dt/dd 태그와 함께 사용
		- dt태그 : 제목(단어)
		- dd태그 : 내용
		-->
		<h1>좋아하는 취미는?(ul 태그)</h1>
		<ul>
			<li>운동</li>
			<li>게임</li>
			<li>독서</li>
		</ul>
		<ul type="square">
			<li>메뉴1</li>
			<li>메뉴2</li>
			<li>메뉴3</li>
		</ul>
		<h1>오늘의 할일은? (ol태그)</h1>
		<ol type="i" start="5">
			<li>등원</li>
			<li>1~4</li>
			<li>점심</li>
		</ol>
		<h1>단어 저의 (dl 태그)</h1>
		<dl>
			<dt>HTML</dt>
			<dd>하이퍼 텍스트 마크업 랭귀지</dd>
			<dt>자바</dt>
			<dd>프로그래밍 언어</dd>
		</dl>
</body>
</html>
