<!--
- 주석: 코드에 영향을 주지 않는 설명 문구
- 주석문 안에 있는 모든 글자들이 다 주석
- 단축키 : cnrl + / 
-->

<!-- 
- html 문서는 태그로 구성
- 태그 종류에 따라 기능이 다름
- 단일 태그
여는 태그만 있음
- 쌍 태그
 열었으면 반드시 닫아야함
 -->
 <!-- 
  <!DOCTYPE html>
  문서의 타입을 지정. html 5 표준임을 나타냄-->
<!DOCTYPE html>
<!-- 
html 태그
- html 문서를 나타내는 태그
-속성 
lang : 문서의 언어를 설정. en : 영어, ko : 한국어
- 검색할 때
-->
<html lang="en">
    <!--
head 태그
    - 문서와 관련된 정보를 모아놓은 태그  -->
    - 키워드, 작성자, 타이들, 파비콘, 화면 너비 설정, css/js 연결

<head>
    <!-- 
    meta 태그
    -문서 정보를 나타내는 태그
    - 문자 인코딩 방식을 지정하거나, 키워드, 작성자, 화면 너비 방식등을 지정
    - charset="UTF-8" : 문자 인코딩을 UTF-8기준으로 인코딩함
    name="viewport" content="width=device-width, initial-scale=1.0"
    name="viewport" : 화면 지정 방식을 설정
    content="width=device-width, initial-scale=1.0"
    - 모바일에서 글자가 작아지는 걸 방지
    -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 
    title 태그
    - 문서의 타이틀을 지정
    - 브라우저 탭 문구를 지정 -->
    <title>Document</title>
</head>
<body>
    <!-- 
    body 태그
    - 화면을 구성하는 태그
    - 구성하는 내용을 body 태그 안에 추가 
    -->
    <h1>기본 태그 예제</h1>
</body>
</html>
