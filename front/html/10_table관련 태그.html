<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>table 관련 태그</title>
</head>
<body>
	<!-- 
	table 작성시 필수 태그
	
	table 태그
	- 테이블을 만들기 위한 태그
	
	tr 태그
	- 한 행을 나타내는 태그
	- 한 행에는 여러 열(th,td) 태그들이 포함
	
	td/th 태그
	- 한 열을 나타내는 태그
	- th는 주로 첫 행에 사용되며, 가운데 정렬, 굵은 글자
	- td는 다음 속성을 이용하여 합칠 수 있음
		-rowspan
			- 행 병함
		-colspam
			- 열 병합

	table 작성시 선택 태그들

	thead 태그
	- 테이블의 첫행
	- 자식 태그로 tr이 옴

	thoby 태그
	- 테이블 본문
	- 대부분 행들(tr)이 여기 속함

	tfoot 태그
	- 테이블 하단
	- 합게와 같이 본문과 다른 종류의 내용이 필요한 경우 아용

	tbody, tfoot 작성 순서와 상관없이 화면에는 항상 tbody, tfoot 순으로 보임

	-->
	
	<h1>테이블 태그 예제1</h1>
	<table border="1">
		<tr>
			<th>과목명</th>
			<th>이름</th>
			<th>점수</th>

		<tr>
			<td>html</td>
			<td>홍길동</td>
			<td>100</td>

		</tr>
		<tr>
			<td>html</td>
			<td>둘리</td>
			<td>90</td>

		</tr>
		<tr>
			<td>html</td>
			<td>임꺽정</td>
			<td>80</td>

		</tr>
		<tr>
			<td></td>
			<td>평균</td>
			<td>90</td>
		</tr>
	</table>

	<h1>테이블 태그 예제2</h1>
	<table border="1">
		<thead>
			<tr>
				<th>과목명</th>
				<th>이름</th>
				<th>점수</th>
			</tr>
		</thead>
		<tfoot>
			<tr>
				
				<td colspan="2">평균</td>
				<td>90</td>
			</tr>
		</tfoot>
		<tbody>
			<tr>
				<td rowspan="3">html</td>
				<td>홍길동</td>
				<td>100</td>

			</tr>
			<tr>

				<td>둘리</td>
				<td>90</td>

			</tr>
			<tr>

				<td>임꺽정</td>
				<td>80</td>

			</tr>
		</tbody>
	</table>

	<h3>사이트 모음</h3>
	<table border="1">
	<tbody>
		<tr>
				<td rowspan="2">국내</td>
				<td><a href="https://www.naver.com/" target="_blank">네이버</a></td>
			</tr>
			<tr>
				<td>다음</td>
			</tr>
		
	</tbody>
	<tbody>
		<tr>
				<td rowspan="2">해외</td>
				<td>구글</td>
			</tr>
			<tr>
				<td>깃헙</td>
			</tr>
		
	</tbody>
<a href="https://www.naver.com/" target="네이버"></a>


</body>
</html>
