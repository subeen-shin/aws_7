<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Document</title>
</head>
<body>
	<!-- 

	p. 63
	form 태그
	- 정보를 서버에 전송하는 태그
	- 속성
		- action : 전송할 주소
		- method : 전송 방식
			- get : 기본값, URL에 정보를 추가 => 정보가 노출
				- 전송할 주소 뒤에 ?로 정보를 추가해서 전달
				- 여러개를 전달하는 경우 ?변수=값1&변수=값2
			- post : header에 정보를 추가 => 정보 노출 x
		- enctype : 서버에 전송할 정보의 종류
			- multpart/form-data : 첨부파일을 서버에 전송할 때 사용  
			-->
<!-- 
	input 태그
	- 정보를 입력하거나 선택할 때 사용하는 태그
	- type 속성 값에 따라 종류가 달라짐
	- 속성
		- type : input 태그의 종류를 지정
			- text : 문자열 입력칸
			- password : 비밀번호 입력칸
			- radio : 여러 개중 하나를 선택, 여러 radio의 name을 동일하게 지정
			- checkbox : 여러 개를 선택, 여러 checkbox의 name을 동일하게 지정
			- date, datetime-local : 날짜/날짜 시간을 선택
			- tel : 전화번호 입력
			- email : 이메일 입력
			- file : 첨부파일, enctype을 설정하고, method를 post로 설정
			- number : 숫자만 입력
			- color : 색상정보 선택
			- buton, submit, reset : 일반버튼, 전송버튼, 리셋버튼
			- image : 이미지를 선택, img 태그로 태체 
		- value : input 태그의 초기값을 설정, radio, checkbox는 필수
		- readonly :읽기 전용 => 수정 불가, 서버에 전송
		- disabled : 수정 불가, 서버에 전송 x
		- required: 필수 항목 지정. 입력 안하면 안내문구 출력
		- placeholder : 입력 전 안내문구, 입력하면 사라짐
		- name
			- 서버에 전송할 때 전송할 이름 지정(변수명)
			- name이 없으면 서버로 전송 안함
		- checked : radio/checkbox에서 처음에 선택하고 싶을 때 사용
		fieldset 태그
		- form 태그 안에서 입력 태그들을 묶을 때 사용
		- 테두리 생김
		- legend 태그를 이용하여 문구를 지정

	button 태그
		- 속성
			-type
				-button: 일반 버튼
				- submit : 전송 버튼, 기본값
				- reset : 리셋 버튼. 같은 form 태그 안에 입력된 모든 값 초기화
	label 태그
		- 입력 요소를 설명하는 태그
		- for 속성을 이용하여 연관된 입력 요소를 지정
		- label 태그를 클릭하면 연관된 입력 요스를 클릭한 것과 같음
			-->
		<form action="" method="get">
			<input type="text" name="name" placeholder="이름을 입력하세요.">
			<input type="password" name="pw" placeholder="비번 입력">
			<h3>성별</h3>
			<div>
				<label>
					<input type="radio" name="gender" value="남성" checked> 남성
				</label>
				<label>
					<input type="radio" name="gender" value="여성"> 여성
				</label>
			</div>
			<h3>취미</h3>
			<div>
				<input type="checkbox" name="hobby" value="운동">
				<label for="hobby1">운동</label>
				<input type="checkbox" name="hobby" value="독서">
				<label for="hobby2">독서</label>
				<input type="checkbox" name="hobby" value="영화감상">
				<label for="hobby3">영화감상</label>
			</div>
			<h3>첨부파일</h3>
			<input type="file" name="file">
			<h3>날짜</h3>
			<input type="date" name="date">
			<br>
			<input type="submit" value="전송">
		</form>
		<hr>
		<form action="">
				<fieldset>
					<legend>form 관련 태그 예제</legend>
					<h3>readonly와 diabled</h3>
					<input type="text" name="text1" value="문자열1"> readonly
					<input type="text" name="text2" value="문자열2"> disabled
				</fieldset>
				<button type="submit">전송</button>
		</form>
</body>
</html>
