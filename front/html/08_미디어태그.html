<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>미디어 태그</title>
</head>
<body>
	<!-- 
	p.65
	audio 태그
	- 오디오 파일을 재생하는 태그
	- 속성
		- controls : 컨트롤러를 보여줌
		- autoplay : 자동 재생, 브라우저 설정에 따라 자동 재생이 안될 수 있음
		- loop : 반복
		- preload : 재생 전 다운로드를 할지 말지를 결정
			- none : 미리 받지 않음
			- metadata : 메타 데이터만 미리 받음
			- auto : 미리 받음
		- 컨트롤러를 생략하고 자동재생을 설정하는건 비추천. 웹 표준 위반
		 -->
	
 <!--
	p. 67 
	video 태그
	- 영상을 재생하는 태그
	- 속성 
		- audio 태그 속성을 사용
		- poster : 재생 전 보여줄 이미지
		- width/height :너비의 높이를 지정
	-->
	<video
		src="https://cdn.pixabay.com/video/2026/04/07/345020_large.mp4"
		controls loop preload="matadata"
		poster="https://pbs.twimg.com/media/HKft71GawAAHYtR.jpg"
		width="400"></video>
	</video>
</body>
</html>
